<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ស្វាគមន៍មកកាន់គេហទំព័ររបស់ខ្ញុំ</title>
    
    <!-- CSS សម្រាប់រចនាឱ្យស្អាត -->
    <style>
        body {
            font-family: 'Kantumruy Pro', sans-serif; /* ប្រើ Font ខ្មែរដែលស្អាត */
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color: #333;
        }

        header {
            background: #2c3e50;
            color: #ffffff;
            padding: 2rem;
            text-align: center;
        }

        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h1 { margin: 0; font-size: 2.5rem; }
        
        .button {
            display: inline-block;
            background: #3498db;
            color: #fff;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }

        .button:hover {
            background: #2980b9;
        }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.9rem;
            color: #666;
        }
    </style>
</head>
<body>

    <header>
        <h1>អ្នកដែលបានចូលមកគេហៈទំព័រនេះទំនងជាមាននិស័យ</h1>
        <p>ស្រឡាញ់បងទេ</p>
    </header>

    <div class="container">
        <h2>ស្រឡាញ់ល័ក្ខពេញបេះដូង</h2>
        <p>ស្រឡាញ់គ្នាតាំងពី ២០២២ ខែ ៩ ថ្ងៃទី ៦ ហាហាហា។</p>
        
        <p>ដូចអត់មានអីនិយាយទៀតទេ</p>

        <a href="#" class="button">អរគុណ bye bye </a>
    </div>

    <footer>
        &copy; ២០២៦ រក្សាសិទ្ធិដោយខ្ញុំបាទ សុខ ធនវីរៈ
    </footer>

</body>
</html>
